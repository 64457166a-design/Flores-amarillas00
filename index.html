<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flores Amarillas para Ti</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    
    <canvas id="canvas"></canvas>

    <main class="container">
        <div class="glass-card">
            <h1 class="title">21 de Septiembre</h1>
            <div class="flower-center">
                <div class="flower-icon">🌻</div>
            </div>
            <p class="message">
                "Un detalle que nace del corazón, porque te mereces todas las flores del mundo, especialmente las amarillas."
            </p>
            <div class="footer-text">Hecho con amor</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
